version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: itd-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-itd_management}
      MYSQL_USER: ${MYSQL_USER:-itd}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-itd123}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - itd-network

  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itd-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-itd}:${MYSQL_PASSWORD:-itd123}@mysql:3306/${MYSQL_DATABASE:-itd_management}
      JWT_SECRET: ${JWT_SECRET:-itd-super-secret-key-2024-change-in-production}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - itd-network

  # 前端 Web
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: itd-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - itd-network

networks:
  itd-network:
    driver: bridge

volumes:
  mysql_data:
